<div class="random-page">
  <button
    type="button"
    class="back-btn"
    (click)="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
    {{ 'common.back' | translate }}
  </button>

  <h1 class="title">{{ 'random.title' | translate }}</h1>

  <div *ngIf="loading" class="loading">
    <p>{{ 'random.loading' | translate }}</p>
    <div class="spinner"></div>
  </div>

  <div *ngIf="!loading && idea" class="idea-card">
    <h2 class="idea-title">{{ idea.title }}</h2>
    <p class="idea-description">{{ idea.description }}</p>

    <div class="tech-list">
      <span class="tech" *ngFor="let tech of idea.technologies">
        {{ tech }}
      </span>
    </div>
  </div>
</div>
