<div class="info-page">
  <button
    type="button"
    class="back-btn"
    (click)="goBack()">
    <span class="material-symbols-outlined">arrow_back</span>
    {{ 'common.back' | translate }}
  </button>

  <div class="info-shell">
    <span class="info-kicker">{{ 'contact.kicker' | translate }}</span>
    <h1>{{ 'contact.title' | translate }}</h1>
    <p>
      {{ 'contact.p1' | translate }}
    </p>
    <p>
      {{ 'contact.p2' | translate }}
    </p>
    <a class="primary-link" routerLink="/">{{ 'contact.home' | translate }}</a>
  </div>
</div>
